<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#13141d"/>
    </linearGradient>
    <linearGradient id="userBubble" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b4261"/>
      <stop offset="100%" stop-color="#2d3355"/>
    </linearGradient>
    <linearGradient id="toolBubble" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#162516"/>
    </linearGradient>
    <linearGradient id="responseBubble" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="url(#bg)" rx="12"/>

  <!-- Window chrome -->
  <rect width="860" height="36" fill="#0f1019" rx="12"/>
  <rect y="24" width="860" height="12" fill="#0f1019"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="430" y="23" text-anchor="middle" font-size="12" fill="#6b7280" font-family="system-ui, sans-serif">swiss-ip-mcp · Claude Desktop</text>

  <!-- ── USER BUBBLE ───────────────────────────────────── -->
  <rect x="24" y="52" width="812" height="54" rx="8" fill="url(#userBubble)" filter="url(#shadow)"/>
  <text x="42" y="71" font-size="10" fill="#7aa2f7" font-weight="bold" font-family="system-ui, sans-serif">YOU</text>
  <text x="42" y="90" font-size="13" fill="#c0caf5" font-family="system-ui, sans-serif">Welche Marken hat Nestlé beim IGE eingetragen? Zeig die letzten 5.</text>

  <!-- ── TOOL CALL BUBBLE ──────────────────────────────── -->
  <rect x="24" y="118" width="812" height="118" rx="8" fill="url(#toolBubble)" filter="url(#shadow)"/>
  <!-- Left border accent -->
  <rect x="24" y="118" width="4" height="118" rx="2" fill="#9ece6a"/>
  <!-- Header -->
  <text x="42" y="137" font-size="10" fill="#9ece6a" font-weight="bold" font-family="system-ui, sans-serif">TOOL CALL</text>
  <rect x="700" y="121" width="130" height="18" rx="4" fill="#1a3320"/>
  <text x="765" y="133" text-anchor="middle" font-size="10" fill="#9ece6a" font-family="system-ui, sans-serif">swiss_ip_search_trademarks</text>
  <!-- JSON params -->
  <text x="42" y="155" font-size="12" fill="#73daca" font-family="'SF Mono', monospace">{</text>
  <text x="58" y="172" font-size="12" font-family="'SF Mono', monospace">
    <tspan fill="#7dcfff">"query"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#9ece6a">"Nestlé*"</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <text x="58" y="189" font-size="12" font-family="'SF Mono', monospace">
    <tspan fill="#7dcfff">"page_size"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#ff9e64">5</tspan><tspan fill="#cdd6f4">,  </tspan>
    <tspan fill="#7dcfff">"response_format"</tspan><tspan fill="#cdd6f4">: </tspan><tspan fill="#9ece6a">"markdown"</tspan>
  </text>
  <text x="42" y="206" font-size="12" fill="#73daca" font-family="'SF Mono', monospace">}</text>
  <text x="42" y="226" font-size="12" fill="#73daca" font-family="'SF Mono', monospace">}</text>

  <!-- ── RESPONSE BUBBLE ───────────────────────────────── -->
  <rect x="24" y="248" width="812" height="252" rx="8" fill="url(#responseBubble)" filter="url(#shadow)"/>
  <rect x="24" y="248" width="4" height="252" rx="2" fill="#7aa2f7"/>
  <text x="42" y="268" font-size="10" fill="#7aa2f7" font-weight="bold" font-family="system-ui, sans-serif">CLAUDE</text>

  <!-- Response content -->
  <text x="42" y="292" font-size="13" fill="#c0caf5" font-family="system-ui, sans-serif">Hier sind die 5 neuesten Marken von Nestlé beim IGE (total: 312):</text>

  <!-- Table header -->
  <rect x="42" y="302" width="796" height="22" rx="3" fill="#1e2d40"/>
  <text x="52" y="317" font-size="11" fill="#7aa2f7" font-weight="bold" font-family="'SF Mono', monospace">Nr.           Marke                   Status          Nizza-Kl.   Anmeldedatum</text>

  <!-- Table rows -->
  <text x="52" y="337" font-size="11" fill="#cdd6f4" font-family="'SF Mono', monospace">CH-756 201    NESCAFÉ GOLD BLEND       Eingetragen     30, 35      2024-11-03</text>
  <rect x="42" y="341" width="796" height="1" fill="#2d3355" opacity="0.5"/>
  <text x="52" y="357" font-size="11" fill="#cdd6f4" font-family="'SF Mono', monospace">CH-756 198    KIT KAT CHUNKY DARK      Eingetragen     30          2024-10-18</text>
  <rect x="42" y="361" width="796" height="1" fill="#2d3355" opacity="0.5"/>
  <text x="52" y="377" font-size="11" fill="#cdd6f4" font-family="'SF Mono', monospace">CH-756 195    NESTLÉ WELLNESS+         Angemeldet      5, 29, 30   2024-10-02</text>
  <rect x="42" y="381" width="796" height="1" fill="#2d3355" opacity="0.5"/>
  <text x="52" y="397" font-size="11" fill="#cdd6f4" font-family="'SF Mono', monospace">CH-756 190    MILO PLANT-BASED         Eingetragen     30          2024-09-15</text>
  <rect x="42" y="401" width="796" height="1" fill="#2d3355" opacity="0.5"/>
  <text x="52" y="417" font-size="11" fill="#cdd6f4" font-family="'SF Mono', monospace">CH-756 185    NESPRESSO VERTUO POP     Eingetragen     11, 21      2024-09-01</text>

  <!-- Pagination hint -->
  <text x="42" y="444" font-size="11" fill="#565f89" font-family="system-ui, sans-serif">→ Weitere 307 Einträge verfügbar. Nächste Seite mit next_page_token aus der Antwort.</text>

  <!-- API source badge -->
  <rect x="600" y="464" width="232" height="22" rx="4" fill="#1a2a3a"/>
  <text x="716" y="479" text-anchor="middle" font-size="10" fill="#4a90a4" font-family="system-ui, sans-serif">Quelle: IGE Swissreg Datadelivery API</text>
</svg>
